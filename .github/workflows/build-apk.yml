name: Build Flet APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Instalar dependências
      run: |
        pip install flet flet-cli buildozer

    - name: Build APK
      run: |
        cd relogio_leao/src
        flet build apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RelogioLeao3D
        path: relogio_leao/src/build/apk/*.apk
