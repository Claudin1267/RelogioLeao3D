name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Flet
        run: pip install flet

      - name: Build APK
        run: |
          cd relogio_leao/src
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: RelogioLeao3D
          path: relogio_leao/src/build/apk/*.apk
